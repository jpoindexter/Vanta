<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vanta Setup — full interactive explorer (1:1)</title>
<style>
  :root{--bg:#0b0e14;--panel:#11151c;--bar:#1b212b;--text:#c9d1d9;--dim:#6b7684;
    --cyan:#56b6c2;--green:#7ee787;--red:#ff7b72;--yellow:#e3b341;--accent:#a371f7;--blue:#61afef;--border:#222a35;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 560px at 50% -8%,#141a24,var(--bg));color:var(--text);
    font:13.5px/1.5 ui-monospace,"SF Mono",Menlo,Consolas,monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px 14px}
  .head{text-align:center;margin-bottom:12px}
  .head h1{margin:0 0 3px;font-size:17px;font-weight:600}.head h1 b{color:var(--accent)}
  .head p{margin:0;color:var(--dim);font-size:12px}
  .term{width:min(940px,100%);background:var(--panel);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .titlebar{background:var(--bar);padding:8px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{color:var(--dim);font-size:12px;margin-right:auto;margin-left:6px}
  select{font:inherit;background:#161b24;color:var(--text);border:1px solid #2b3543;border-radius:6px;padding:5px 9px;cursor:pointer;max-width:300px}
  select:focus{outline:none;border-color:var(--accent)}
  .nav{display:flex;gap:6px;align-items:center}
  .navbtn{font:inherit;background:#1a2230;color:var(--text);border:1px solid #2b3543;border-radius:6px;padding:5px 9px;cursor:pointer}
  .navbtn:hover{border-color:var(--accent)}
  .screen{padding:15px 17px;height:480px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
  .screen::-webkit-scrollbar{width:9px}.screen::-webkit-scrollbar-thumb{background:#2a323d;border-radius:6px}
  .line{animation:f .12s ease}@keyframes f{from{opacity:0}to{opacity:1}}
  .cyan{color:var(--cyan)}.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--yellow)}
  .dim{color:var(--dim)}.accent{color:var(--accent)}.blue{color:var(--blue)}.bold{font-weight:700}
  .opt{display:block;width:100%;text-align:left;font:inherit;background:transparent;color:var(--text);border:1px solid transparent;border-radius:5px;padding:3px 8px;cursor:pointer;margin:1px 0}
  .opt:hover{background:#141b24;border-color:#2b3543}
  .opt.sel{color:var(--green);font-weight:700}
  .foot{margin-top:9px;color:var(--dim);font-size:11.5px;text-align:center}
  .foot b{color:var(--accent)}
</style>
</head>
<body>
  <div class="head">
    <h1>◆ <b>vanta setup</b> — full interactive explorer</h1>
    <p>Every page, every option. Dropdown jumps to any section. Local-first; no external accounts required.</p>
  </div>
  <div class="term">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="t">vanta setup</span>
      <div class="nav"><button class="navbtn" id="prev">‹ Prev</button><select id="nav"></select><button class="navbtn" id="next">Next ›</button></div>
    </div>
    <div class="screen" id="screen"></div>
  </div>
  <div class="foot">● selected / ○ option · [✓] toggled · click to explore · minus the catchy stuff (Spotify, smart-home toys)</div>

<script>
const PROVIDERS=["OpenAI (ChatGPT models, direct API)","Anthropic (Claude, API key or Claude Code)","Google Gemini ▸ (AI Studio API or OAuth + Code Assist)","OpenAI Codex (via ChatGPT subscription)","OpenRouter (one key → 200+ models)","Ollama (local, no key)","LM Studio (local desktop server)","NVIDIA NIM (Nemotron + open models)","DeepSeek (V3, R1, coder)","xAI Grok ▸ (direct API or SuperGrok OAuth)","Groq (ultra-fast inference)","Mistral AI","Together AI (open models)","Fireworks AI","Cerebras (ultra-fast)","Moonshot / Kimi ▸","MiniMax ▸","Z.AI / GLM (Zhipu)","Qwen / DashScope (Alibaba)","NovitaAI (open models)","Perplexity (Sonar, web-grounded)","Hugging Face (Inference Providers)","StepFun Step Plan","Arcee AI (Trinity)","GMI Cloud","Kilo Code","OpenCode ▸ (Zen or Go)","AWS Bedrock (Claude, Nova, Llama)","Azure Foundry (OpenAI- or Anthropic-style)","Custom endpoint (enter URL manually)","Configure auxiliary models…","Leave unchanged"];
const EXEC=["Local — run directly on this machine (default)","Docker — isolated container with configurable resources","Modal — serverless cloud sandbox","SSH — run on a remote machine","Daytona — persistent cloud development environment","Singularity/Apptainer — HPC-friendly container","Keep current (local)"];
const TTS=["Edge TTS (free, cloud, no setup)","OpenAI TTS (needs API key)","ElevenLabs (premium, needs key)","xAI TTS (Grok voices)","MiniMax TTS (voice cloning, needs key)","Mistral Voxtral TTS (multilingual)","Google Gemini TTS (30 voices)","NeuTTS (local, ~300MB)","KittenTTS (local, ~25MB ONNX)","Keep current (Edge TTS)"];
const TOOLPROG=["off — silent, just the final response","new — show tool name when it changes","all — show every tool call (default)","verbose — full args, results, debug"];
const REASONING=["auto (model default)","minimal","low","medium","high","xhigh"];
const SESSION=["Inactivity + daily reset (recommended)","Inactivity only (after N minutes idle)","Daily only (at a fixed hour)","Never auto-reset (until /reset or compression)","Keep current"];
const SEARCH=["DuckDuckGo — keyless [default, built-in]","SearXNG — self-hosted, private","SerpAPI — key","Brave Search — key","Exa — semantic, key","Tavily — search + extract, key","Jina / Bing — keyless fallbacks"];
const VISION=["Keep current / skip","gpt-4o-mini — cheap (OpenAI)","gpt-4o — strong (OpenAI)","claude-sonnet-4-6 (Anthropic)","↳ enter a custom value"];
const MAXITER=["50 — default","30 — lean / cheap","90 — complex exploration","↳ enter a custom value"];
const MEMORY=["50 — default","25 — lean","100 — generous","↳ enter a custom value"];
const THEME=["auto — match your terminal","dark","light"];
const SPINNER=["Keep default (braille)","orbit","dots","pulse","snake","wave"];
const MESSAGING=["📱 Telegram","💼 Slack","🔐 Matrix","💬 Mattermost","📲 WhatsApp","📡 Signal","📧 Email","📱 SMS (Twilio)","💬 DingTalk","🪽 Feishu / Lark","💬 WeCom (Enterprise WeChat)","💬 WeCom Callback (Self-Built App)","💬 Weixin / WeChat","💬 BlueBubbles (iMessage)","🐧 QQ Bot","💎 Yuanbao","🎮 Discord","💬 Google Chat","💬 IRC","💚 LINE","🔔 ntfy","📱 iMessage via Photon","🔒 SimpleX Chat","💼 Microsoft Teams"];
const TOOLS=[["🔍 Web Search & Scraping",1],["🌐 Browser Automation",1],["💻 Terminal & Processes",1],["📁 File Operations",1],["⚡ Code Execution",1],["👁️  Vision / Image Analysis",1],["🎬 Video Analysis",0],["🎨 Image Generation",1],["🎬 Video Generation",0],["🐦 X (Twitter) Search",0],["🧠 Mixture of Agents",0],["🔊 Text-to-Speech",1],["📚 Skills",1],["📋 Task Planning",1],["💾 Memory",1],["🧩 Context Engine",1],["🔎 Session Search",1],["❓ Clarifying Questions",1],["👥 Task Delegation",1],["⏰ Cron Jobs",1],["📨 Cross-Platform Messaging",1],["🖱️  Computer Use",1]];
const TOOL_PROVIDERS={"🌐 Browser Automation":["Local Browser [★ free] — Headless Chromium, no key","Camofox [free · local] — Anti-detection browser","Browserbase [paid] — Cloud browser, stealth/proxies","Browser Use [paid] — Cloud browser, remote"],"🎨 Image Generation":["FAL.ai [paid] — flux-2, gpt-image, nano-banana","OpenAI [paid] — gpt-image-2 (low/medium/high)","xAI Grok Imagine [paid]"],"🔊 Text-to-Speech":["Microsoft Edge TTS [★ free] — no key","OpenAI TTS [paid]","xAI TTS — Grok voices","ElevenLabs [paid] — most natural","KittenTTS [local · free]"],"🔍 Web Search & Scraping":["DuckDuckGo (ddgs) [free · no key]","SearXNG [free · self-hosted]","SerpAPI [paid]","Brave Search [free tier]","Exa [paid] — semantic","Tavily [paid] — search + extract"]};
const SUMMARY=[["✓","Vision (image analysis)",""],["✗","Mixture of Agents","missing OPENROUTER_API_KEY"],["✓","Web Search & Extract (DuckDuckGo)",""],["✓","Browser Automation (Local browser)",""],["✓","Image Generation (FAL)",""],["✓","Text-to-Speech (Edge TTS)",""],["✓","Terminal/Commands",""],["✓","Task Planning (todo)",""],["✓","Skills (view, create, edit)",""],["✗","Gmail/Calendar/Drive","missing VANTA_GOOGLE_CLIENT_ID"]];

const PAGES=[
  {id:"mode",nm:"1 · Setup Mode",render:p=>{head(["◆ Vanta Setup Wizard","Configure your operator end to end · Ctrl+C to exit"]);blank();menu("How would you like to set up Vanta?",["Quick — pick a model, sensible defaults for everything else","Full — configure every provider, tool & option yourself"],1,p);}},
  {id:"config",nm:"2 · Configuration Location",render:()=>{hdr("Configuration Location");info("Settings + secrets:  ~/Vanta/vanta-ts/.env");info("Data + brain:        ~/.vanta/");blank();info("Edit directly or use `vanta config edit`.");}},
  {id:"provider",nm:"3 · Inference Provider",render:p=>{hdr("Inference provider");dimln("  Choose how to connect to your chat model.");blank();menu("Select provider:",PROVIDERS,0,p,0);}},
  {id:"exec",nm:"4 · Terminal Backend",render:p=>{hdr("Terminal Backend");dimln("  Where Vanta runs shell commands + code.");blank();menu("Select terminal backend:",EXEC,0,p,0);}},
  {id:"tts",nm:"5 · Text-to-Speech",render:p=>{hdr("Text-to-Speech (optional)");dimln("  Voice for spoken replies.");blank();menu("Select TTS provider:",TTS,0,p);}},
  {id:"agent",nm:"6 · Agent Settings",render:p=>{hdr("Agent Settings");out("  Max iterations: 50   (Enter a number)","dim");blank();menu("Tool progress display:",TOOLPROG,2,p,-1,"tp");blank();out("  Compression threshold (0.5-0.95): 0.50","dim");blank();menu("Reasoning effort:",REASONING,0,p,-1,"re");blank();menu("Session reset:",SESSION,0,p,-1,"sr");}},
  {id:"vision",nm:"7 · Vision model (auxiliary)",render:p=>{hdr("Vision model (auxiliary)");dimln("  Image analysis when your main model isn't vision-capable.");blank();menu("Vision model (Esc = skip):",VISION,0,p);}},
  {id:"search",nm:"8 · Web search backend",render:p=>{hdr("Web search backend");dimln("  Vanta's built-in web search (DuckDuckGo keyless by default).");blank();menu("Web search (Esc = skip):",SEARCH,0,p);}},
  {id:"memory",nm:"9 · Memory budget",render:p=>{hdr("Memory budget (per goal)");dimln("  Memory blocks kept per goal (older stay in git).");blank();menu("Memory budget (Esc = skip):",MEMORY,0,p);}},
  {id:"display",nm:"10 · Display (theme + spinner)",render:p=>{hdr("Display theme");blank();menu("Theme:",THEME,0,p,-1,"th");blank();out("  ◆ Busy spinner style","accent bold");menu("Spinner:",SPINNER,0,p,-1,"sp");}},
  {id:"messaging",nm:"11 · Messaging Platforms (24)",render:p=>{hdr("Messaging Platforms");dimln("  Chat with Vanta from anywhere.");blank();checklist("Select platforms to configure:",MESSAGING,[],p);}},
  {id:"tools",nm:"12 · Tools (22)",render:p=>{out("◆ Tool Configuration","accent bold");dimln("  Enable or disable tools. (Spotify + smart-home toys excluded.)");blank();checklist("Select toolsets:",TOOLS.map(t=>t[0]),TOOLS.map((t,i)=>t[1]?i:-1).filter(i=>i>=0),p);}},
  {id:"toolprov",nm:"13 · Tool Provider menus",render:p=>{out("Per-tool provider sub-menus (shown when a tool is enabled):","accent bold");blank();Object.entries(TOOL_PROVIDERS).forEach(([tool,provs])=>{out("  --- "+tool+" - Choose a provider ---","cyan");provs.forEach((pr,i)=>{const b=document.createElement("button");b.className="opt"+(i===0?" sel":"");b.innerHTML=`<span>${i===0?" → (●)":"   (○)"}</span> ${pr}`;b.onclick=()=>{};screen.appendChild(b);});blank();});}},
  {id:"caps",nm:"14 · Capability Availability",render:()=>{hdr("Capability Availability");const ok=SUMMARY.filter(r=>r[0]==="✓").length;out("  "+ok+"/"+SUMMARY.length+" capabilities available:","dim");blank();SUMMARY.forEach(([m,n,miss])=>m==="✓"?out("   ✓ "+n,"green"):out("   ✗ "+n+" ("+miss+")","red"));}},
  {id:"personality",nm:"15 · Personality",render:()=>{hdr("Personality");dimln("  One line on how Vanta should act — appended to its identity (brain).");blank();out("  > be terse, senior, no hand-holding","yellow");out("  ✓ Added to Vanta's identity.","green");}},
  {id:"done",nm:"16 · Setup complete",render:()=>{box(["✓ Setup complete!"],"green");blank();out("  📁 Your files:");out("     Settings + secrets:  ~/Vanta/vanta-ts/.env","dim");out("     Data + brain:        ~/.vanta/","dim");blank();out("  📝 Manage later:");[["vanta setup model","change model / provider"],["vanta setup messaging","configure a messaging gateway"],["vanta config get|set","view / change a setting"],["vanta config check","validate your config"]].forEach(([c,d])=>out("     "+c.padEnd(24)+d,"dim"));blank();out("  🚀 Run `vanta` to start.","accent");}},
];

const screen=document.getElementById("screen");
let cur=0;
function out(t,c){const d=document.createElement("div");d.className="line"+(c?" "+c:"");d.textContent=t;screen.appendChild(d);}
function blank(){out("​");}
function info(t){out("  "+t,"dim");}
function dimln(t){out(t,"dim");}
function box(lines,cls){const inner=Math.max(...lines.map(l=>[...l].length))+2;const bar=(l,r)=>"  "+l+"─".repeat(inner)+r;out([bar("┌","┐"),...lines.map(l=>"  │ "+l+" ".repeat(inner-1-[...l].length)+"│"),bar("└","┘")].join("\n"),cls);}
function head(lines){box(lines,"accent");}
function hdr(t){out("  ◆ "+t,"accent bold");}
function menu(title,options,def,page,current=-1,grp){
  out("  "+title,"yellow");dimln("  ↑↓ navigate  ENTER/SPACE select  ESC cancel");blank();
  const key=grp?("_s_"+grp):"_s";const chosen=page[key]!==undefined?page[key]:def;
  options.forEach((o,i)=>{const sel=i===chosen;const b=document.createElement("button");b.className="opt"+(sel?" sel":"");
    b.innerHTML=`<span>${sel?" → (●)":"   (○)"}</span> ${o}${i===current?'  ← currently active':''}`;b.onclick=()=>{page[key]=i;renderCur();};screen.appendChild(b);});
}
function checklist(title,options,preSel,page){
  out("  "+title,"yellow");dimln("  ↑↓ navigate  SPACE toggle  ENTER confirm  ESC cancel");blank();
  if(!page._chk)page._chk=new Set(preSel);
  options.forEach((o,i)=>{const on=page._chk.has(i);const b=document.createElement("button");b.className="opt"+(on?" sel":"");
    b.innerHTML=`<span>${i===0?" → ":"   "}[${on?"✓":" "}]</span> ${o}  <span class="dim">(not configured)</span>`;
    b.onclick=()=>{on?page._chk.delete(i):page._chk.add(i);renderCur();};screen.appendChild(b);});
  const c=document.createElement("button");c.className="opt";c.innerHTML="<span>   </span> Continue →";screen.appendChild(c);
}
function renderCur(){screen.innerHTML="";const p=PAGES[cur];p.render(p);document.getElementById("nav").value=String(cur);screen.scrollTop=0;}
const navSel=document.getElementById("nav");
PAGES.forEach((p,i)=>{const o=document.createElement("option");o.value=String(i);o.textContent=p.nm;navSel.appendChild(o);});
navSel.onchange=e=>{cur=+e.target.value;renderCur();};
document.getElementById("prev").onclick=()=>{cur=(cur-1+PAGES.length)%PAGES.length;renderCur();};
document.getElementById("next").onclick=()=>{cur=(cur+1)%PAGES.length;renderCur();};
renderCur();
</script>
</body>
</html>
