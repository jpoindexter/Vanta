<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hermes Agent Setup Wizard — 1:1 interactive replica</title>
<style>
  :root{
    --bg:#0a0a0f;--panel:#0e0e14;--bar:#16161e;--text:#d4d4d8;--dim:#6a6a78;
    --cyan:#34d3eb;--green:#5ee06a;--red:#ff6b6b;--yellow:#f4c542;--magenta:#c678dd;--blue:#61afef;--border:#21212b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 560px at 50% -8%,#15151f,var(--bg));color:var(--text);
    font:13.5px/1.5 ui-monospace,"SF Mono",Menlo,Consolas,monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 14px}
  .head{text-align:center;margin-bottom:14px}
  .head h1{margin:0 0 3px;font-size:17px;font-weight:600}
  .head h1 b{color:var(--magenta)}
  .head p{margin:0;color:var(--dim);font-size:12px}
  .head a{color:var(--blue);text-decoration:none}
  .term{width:min(900px,100%);background:var(--panel);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.55)}
  .titlebar{background:var(--bar);padding:8px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border)}
  .dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .titlebar .t{margin-left:8px;color:var(--dim);font-size:12px}
  .screen{padding:14px 16px;height:430px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
  .screen::-webkit-scrollbar{width:9px}.screen::-webkit-scrollbar-thumb{background:#2a2a36;border-radius:6px}
  .line{animation:f .16s ease}@keyframes f{from{opacity:0;transform:translateY(2px)}to{opacity:1}}
  .cyan{color:var(--cyan)}.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--yellow)}
  .dim{color:var(--dim)}.magenta{color:var(--magenta)}.blue{color:var(--blue)}.bold{font-weight:700}
  .controls{padding:11px 16px;border-top:1px solid var(--border);background:#08080d;min-height:54px}
  .prompt{color:var(--yellow);margin-bottom:7px}
  .row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  button{font:inherit;background:#15151e;color:var(--text);border:1px solid #29293a;border-radius:6px;padding:6px 11px;cursor:pointer;transition:.1s}
  button:hover{background:#1d1d29;border-color:var(--magenta)}
  button.primary{border-color:var(--magenta);color:#fff;background:#211a2b}
  .opt{display:block;width:100%;text-align:left;margin:3px 0;padding:6px 9px}
  .opt:hover{border-color:var(--cyan)}
  .opt .mk{color:var(--green)}
  .list{max-height:230px;overflow-y:auto;padding-right:4px}
  .list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:#2a2a36;border-radius:6px}
  .chk{display:block;width:100%;text-align:left;margin:2px 0;padding:5px 9px;cursor:pointer;border:1px solid #29293a;border-radius:6px;background:#13131b}
  .chk:hover{border-color:var(--cyan)}
  .chk.on{border-color:#2f5b34;background:#10160f}
  .chk .box{color:var(--green);margin-right:6px}
  .chk .sub{color:var(--dim);font-size:11.5px}
  input{font:inherit;background:#08080d;color:var(--text);border:1px solid #29293a;border-radius:6px;padding:6px 9px;flex:1;min-width:200px;outline:none}
  input:focus{border-color:var(--magenta)}
  .hint{color:var(--dim);font-size:11.5px;margin-top:6px}
  .footer{margin-top:10px;color:var(--dim);font-size:11.5px;text-align:center}
  .footer b{color:var(--magenta)}
</style>
</head>
<body>
  <div class="head">
    <h1>⚕ <b>hermes setup</b> — 1:1 interactive replica</h1>
    <p>Faithful recreation of NousResearch <a href="https://github.com/NousResearch/hermes-agent">hermes-agent</a>'s real wizard. Click through every section.</p>
  </div>
  <div class="term">
    <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="t">jasonpoindexter@mac — hermes setup</span></div>
    <div class="screen" id="screen"></div>
    <div class="controls" id="controls"></div>
  </div>
  <div class="footer">Reproduces <b>hermes_cli/setup.py</b> @ commit 2c174bc · source vendored at <b>hermes-setup-reference/</b> · not affiliated with Nous Research</div>

<script>
// ── Data (verbatim from hermes_cli/setup.py + tools_config.py) ──────────────
const PROVIDERS = [
  "Nous Portal (Everything your agent needs, 300+ models with bundled tool use)",
  "OpenRouter (Pay-per-use API aggregator)",
  "NovitaAI (Cloud: Model API, Agent Sandbox, GPU Cloud)",
  "LM Studio (Local desktop app with built-in model server)",
  "Anthropic (Claude models via API key or Claude Code)",
  "OpenAI ▸ (Codex CLI or direct OpenAI API)",
  "Qwen Cloud / DashScope (Qwen + multi-provider)",
  "xAI Grok ▸ (Direct API or SuperGrok / Premium+ OAuth)",
  "Xiaomi MiMo (MiMo-V2.5 and V2 models: pro, omni, flash)",
  "Tencent TokenHub (Hy3 Preview via tokenhub.tencentmaas.com)",
  "NVIDIA NIM (Nemotron models via build.nvidia.com or local NIM)",
  "GitHub Copilot ▸ (GitHub token API or copilot --acp process)",
  "Hugging Face Inference Providers",
  "Google Gemini ▸ (AI Studio API or OAuth + Code Assist)",
  "DeepSeek (V3, R1, coder, direct API)",
  "Z.AI / GLM (Zhipu direct API)",
  "Kimi / Moonshot ▸ (Coding Plan, Moonshot global & China endpoints)",
  "StepFun Step Plan (Agent / coding models via Step Plan API)",
  "MiniMax ▸ (Global, OAuth Coding Plan & China endpoints)",
  "Ollama Cloud (Cloud-hosted open models, ollama.com)",
  "Arcee AI (Trinity models, direct API)",
  "GMI Cloud (Multi-model direct API)",
  "Kilo Code (Kilo Gateway API)",
  "OpenCode ▸ (Zen pay-as-you-go or Go subscription)",
  "AWS Bedrock (Claude, Nova, Llama, DeepSeek; IAM or API key)",
  "Azure Foundry (OpenAI-style or Anthropic-style endpoint)",
  "Qwen OAuth (Reuses local Qwen CLI login)",
  "Custom endpoint (enter URL manually)",
  "Configure auxiliary models...",
  "Leave unchanged",
];
const TERMINALS = [
  "Local - run directly on this machine (default)",
  "Docker - isolated container with configurable resources",
  "Modal - serverless cloud sandbox",
  "SSH - run on a remote machine",
  "Daytona - persistent cloud development environment",
  "Singularity/Apptainer - HPC-friendly container",
  "Keep current (local)",
];
const PLATFORMS = [
  ["💬","Telegram"],["#️⃣","Slack"],["🎮","Discord"],["🔗","Matrix"],
  ["💙","BlueBubbles (iMessage)"],["🐧","QQBot"],["🪝","Webhooks"],
];
const TOOLSETS = [ // [emoji+label, enables, defaultOn]
  ["🔍 Web Search & Scraping","web_search, web_extract",true],
  ["🌐 Browser Automation","navigate, click, type, scroll",true],
  ["💻 Terminal & Processes","terminal, process",true],
  ["📁 File Operations","read, write, patch, search",true],
  ["⚡ Code Execution","execute_code",true],
  ["👁️  Vision / Image Analysis","vision_analyze",true],
  ["🎬 Video Analysis","video_analyze (requires video-capable model)",false],
  ["🎨 Image Generation","image_generate",true],
  ["🎬 Video Generation","video_generate (text-to-video + image-to-video)",false],
  ["🐦 X (Twitter) Search","x_search (requires xAI OAuth or XAI_API_KEY)",false],
  ["🧠 Mixture of Agents","mixture_of_agents",false],
  ["🔊 Text-to-Speech","text_to_speech",true],
  ["📚 Skills","list, view, manage",true],
  ["📋 Task Planning","todo",true],
  ["💾 Memory","persistent memory across sessions",true],
  ["🧩 Context Engine","runtime tools from the active context engine",true],
  ["🔎 Session Search","search past conversations",true],
  ["❓ Clarifying Questions","clarify",true],
  ["👥 Task Delegation","delegate_task",true],
  ["⏰ Cron Jobs","create/list/update/pause/resume/run",true],
  ["📨 Cross-Platform Messaging","send_message",true],
  ["🏠 Home Assistant","smart home device control",false],
  ["🎵 Spotify","playback, search, playlists, library",false],
  ["🖱️  Computer Use (macOS)","background desktop control via cua-driver",true],
];
const TOOL_PROVIDERS = {
  "🌐 Browser Automation": ["Local Browser [★ recommended · free] — Headless Chromium, no API key needed","Nous Subscription (Browser Use cloud) [subscription]","Camofox [free · local] — Anti-detection browser","Browserbase [paid] — Cloud browser with stealth and proxies","Browser Use [paid] — Cloud browser with remote execution"],
  "🎨 Image Generation": ["Nous Subscription [subscription] — Managed FAL image generation","FAL.ai [paid] — flux-2-klein, flux-2-pro, gpt-image, nano-banana","OpenAI [paid] — gpt-image-2 at low/medium/high quality","xAI Grok Imagine (image) [paid] — grok-imagine-image"],
  "🎬 Video Generation": ["Nous Subscription [subscription] — Managed FAL video generation","FAL [paid] — LTX, Pixverse, Veo 3.1, Seedance 2.0, Kling 4K"],
  "🔊 Text-to-Speech": ["Microsoft Edge TTS [★ recommended · free] — Good quality, no API key","Nous Subscription [subscription] — Managed OpenAI TTS","OpenAI TTS [paid] — High quality voices","xAI TTS — Grok voices (OAuth or XAI_API_KEY)","ElevenLabs [paid] — Most natural voices","KittenTTS [local · free] — Lightweight local ONNX (~25MB)"],
  "🔍 Web Search & Scraping": ["Nous Subscription [subscription] — Managed Firecrawl","Exa [paid] — Semantic + neural web search","Firecrawl [paid] — Full search + extract","Parallel [free] — Hosted Search MCP, no key needed","SearXNG [free · self-hosted] — Privacy metasearch","Tavily [paid] — Search + extract","DuckDuckGo (ddgs) [free · no key]"],
  "🐦 X (Twitter) Search": ["xAI Grok OAuth (SuperGrok / Premium+) [subscription] — Browser login","xAI API key [paid] — Direct xAI API billing via XAI_API_KEY"],
};
const SUMMARY_ROWS = [
  ["✓","Vision (image analysis)",""],
  ["✗","Mixture of Agents","missing OPENROUTER_API_KEY"],
  ["✓","Web Search & Extract (Firecrawl)",""],
  ["✓","Browser Automation (Local browser)",""],
  ["✓","Image Generation (Nous subscription)",""],
  ["✓","Video Generation (FAL)",""],
  ["✓","Text-to-Speech (Edge TTS)",""],
  ["✓","Modal Execution (optional via Nous subscription)",""],
  ["✗","Skills Hub (GitHub)","missing GITHUB_TOKEN"],
  ["✓","Terminal/Commands",""],
  ["✓","Task Planning (todo)",""],
  ["✓","Skills (view, create, edit)",""],
];

// ── Engine ──────────────────────────────────────────────────────────────────
const screen=document.getElementById("screen"), controls=document.getElementById("controls");
let toolChecks={}, enabledProviderTools=[], providerToolIdx=0;
function out(t,c){const d=document.createElement("div");d.className="line"+(c?" "+c:"");d.textContent=t;screen.appendChild(d);screen.scrollTop=screen.scrollHeight;}
function blank(){out("​");}
function clearC(){controls.innerHTML="";}
function prompt(t){const d=document.createElement("div");d.className="prompt";d.textContent=t;controls.appendChild(d);}
function btn(label,fn,cls){const b=document.createElement("button");b.textContent=label;b.className=cls||"";b.onclick=fn;return b;}
function rowOf(...els){const r=document.createElement("div");r.className="row";els.forEach(e=>r.appendChild(e));controls.appendChild(r);return r;}
function box(lines,cls){ // magenta/green box like Hermes (59-wide feel, auto-size)
  const inner=Math.max(...lines.map(l=>[...l].length))+2;
  const bar=(l,r)=>"  "+l+"─".repeat(inner)+r;
  const body=lines.map(l=>"  │ "+l+" ".repeat(inner-1-[...l].length)+"│");
  out([bar("┌","┐"),...body,bar("└","┘")].join("\n"),cls);
}
function header(t){blank();out("◆ "+t,"cyan bold");}

// ── Flow ────────────────────────────────────────────────────────────────────
function start(){
  screen.innerHTML="";toolChecks={};enabledProviderTools=[];providerToolIdx=0;
  box(["⚕ Hermes Agent Setup Wizard","Let's configure your Hermes Agent installation.","Press Ctrl+C at any time to exit."],"magenta");
  modeChoice();
}
function modeChoice(){
  blank();out("How would you like to set up Hermes?","yellow");
  clearC();prompt("Select [1-2] (1):");
  const wrap=document.createElement("div");
  [["Quick Setup (Nous Portal) — free OAuth login, no API keys, model + tools (recommended)",quick],
   ["Full setup — configure every provider, tool & option yourself (bring your own keys)",fullStart]].forEach(([label,fn],i)=>{
    const b=btn((i===0?"● ":"○ ")+label,()=>{out((i===0?"● ":"○ ")+label,"green");fn();},"opt");wrap.appendChild(b);
  });
  controls.appendChild(wrap);
}
function quick(){
  header("Nous Portal");
  out("One subscription, 300+ models, plus the Tool Gateway:","dim");
  out("  web search, image generation, TTS, browser automation.","dim");
  out("Sign up: https://portal.nousresearch.com/manage-subscription","blue");
  blank();out("Starting Hermes login via Nous Portal…","dim");
  out("  1. Open: https://portal.nousresearch.com/manage-subscription?user_code=L55K-BY95","blue");
  out("  2. If prompted, enter code: L55K-BY95","dim");
  clearC();prompt("(device-code OAuth — demo)");rowOf(btn("✓ Simulate portal login",()=>{out("  Nous Portal login successful.","green");out("Default model set to: hermes-4-70b (via Nous Portal)","green");terminalBackend(true);},"primary"));
}
function fullStart(){
  header("Configuration Location");
  out("Config file:  ~/.hermes/config.yaml","dim");
  out("Secrets file: ~/.hermes/.env","dim");
  out("Data folder:  ~/.hermes","dim");
  out("Install dir:  ~/.hermes/hermes-agent","dim");
  blank();out("You can edit these files directly or use 'hermes config edit'","dim");
  providerStep();
}
function providerStep(){
  header("Inference Provider");
  out("Choose how to connect to your main chat model.","dim");
  out("   Guide: https://hermes-agent.nousresearch.com/docs/integrations/providers","blue");
  blank();out("  Current model:    none","dim");out("  Active provider:  none","dim");
  clearC();prompt("Select provider:");
  const list=document.createElement("div");list.className="list";
  PROVIDERS.forEach((p,i)=>{const b=btn((i===0?"● ":"○ ")+p,()=>pickProvider(p),"opt");list.appendChild(b);});
  controls.appendChild(list);
  controls.appendChild(Object.assign(document.createElement("div"),{className:"hint",textContent:"▸ = a provider group (drills into a sub-picker). 27 providers + custom/auxiliary."}));
}
function pickProvider(p){
  out("○ "+p,"green");
  if(p.startsWith("Google Gemini")){ // OAuth warning branch
    blank();out("⚠  Google considers using the Gemini CLI OAuth client with third-party","yellow");
    out("   software a policy violation. Some users have reported account","yellow");
    out("   restrictions. You can use your own API key via 'gemini' provider","yellow");
    out("   for the lowest-risk experience.","yellow");
    clearC();prompt("Continue with OAuth login? [y/N]:");
    rowOf(btn("y",()=>{out("Opening your browser to sign in to Google…","dim");out("  No GCP project configured — free tier will be auto-provisioned.","dim");out("Default model set to: gemini-3.5-flash (via Google Gemini OAuth / Code Assist)","green");terminalBackend();},"primary"),
          btn("N",()=>{out("Cancelled.","dim");providerStep();}));
  } else if(p.startsWith("Anthropic")){
    blank();out("  Choose authentication method:","yellow");
    clearC();
    const w=document.createElement("div");
    ["Claude Pro/Max subscription (OAuth login)","Anthropic API key (pay-per-token)","Cancel"].forEach((c,i)=>w.appendChild(btn(`  ${i+1}. ${c}`,()=>{
      if(i===2){providerStep();return;}
      out(`  ${i+1}. ${c}`,"green");
      if(i===1){keyEntry("ANTHROPIC_API_KEY","https://platform.claude.com/settings/keys","anthropic","claude-sonnet-4-6");}
      else{out("  ✓ Claude OAuth login complete.","green");out("Default model set to: claude-sonnet-4-6 (via Anthropic)","green");terminalBackend();}
    },"opt")));
    controls.appendChild(w);
  } else if(p.startsWith("Nous Portal")){quick();}
  else if(p.startsWith("Ollama")||p.startsWith("LM Studio")){out("  No API key needed (local).","green");out("Default model set to: qwen2.5:14b (via "+p.split(" (")[0]+")","green");terminalBackend();}
  else if(p.startsWith("OpenRouter")){keyEntry("OPENROUTER_API_KEY","https://openrouter.ai/keys","openrouter","anthropic/claude-sonnet-4.5");}
  else if(p.startsWith("Custom")||p.startsWith("Configure")||p.startsWith("Leave")){out("No change.","dim");providerStep();}
  else{keyEntry(p.split(" (")[0].toUpperCase().replace(/[^A-Z]/g,"_")+"_API_KEY","(provider console)",p.split(" (")[0].toLowerCase(),"default-model");}
}
function keyEntry(env,url,id,model){
  clearC();out("  Get a key: "+url,"blue");prompt(env+" (or Enter to cancel):");
  const inp=document.createElement("input");inp.type="password";inp.placeholder="key (demo — nothing sent)";
  const go=()=>{out("  API key saved.","green");out("Default model set to: "+model+" (via "+id+")","green");terminalBackend();};
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  rowOf(inp,btn("Save",go,"primary"),btn("Use demo key",()=>{inp.value="sk-demo";go();}));inp.focus();
}
function terminalBackend(fromQuick){
  header("Terminal Backend");
  out("Choose where Hermes runs shell commands and code.","dim");
  out("This affects tool execution, file access, and isolation.","dim");
  out("   Guide: https://hermes-agent.nousresearch.com/docs/developer-guide/environments","blue");
  clearC();prompt("Select terminal backend:");
  const w=document.createElement("div");
  TERMINALS.forEach((t,i)=>w.appendChild(btn((i===0?"● ":"○ ")+t,()=>{out((i===0?"● ":"○ ")+t,"green");out("Terminal backend set to: "+t.split(" -")[0].split(" (")[0],"green");agentDefaults(fromQuick);},"opt")));
  controls.appendChild(w);
}
function agentDefaults(fromQuick){
  blank();out("✓ Applied recommended defaults:","green");
  out("    Max iterations: 150","dim");
  out("    Tool progress: all","dim");
  out("    Compression threshold: 0.50","dim");
  out("    Session reset: never (use /reset or compression)","dim");
  out("    Run `hermes setup agent` later to customize.","dim");
  messagingStep();
}
function messagingStep(){
  header("Messaging Platforms");
  out("Connect to messaging platforms to chat with Hermes from anywhere.","dim");
  out("Toggle with Space, confirm with Enter.","dim");
  clearC();prompt("Select platforms to configure:");
  const sel=new Set();
  const w=document.createElement("div");
  PLATFORMS.forEach(([e,l])=>{
    const b=document.createElement("button");b.className="chk";b.innerHTML=`<span class="box">[ ]</span>${e} ${l}  <span class="sub">(not configured)</span>`;
    b.onclick=()=>{const on=b.classList.toggle("on");b.querySelector(".box").textContent=on?"[✓]":"[ ]";on?sel.add(l):sel.delete(l);};
    w.appendChild(b);
  });
  controls.appendChild(w);
  rowOf(btn("Continue →",()=>{
    if(sel.size){out("  ["+[...sel].join(", ")+"] — would prompt for tokens (Telegram QR, Slack manifest, …).","dim");}
    else{out("No platforms selected. Run 'hermes setup gateway' later to configure.","dim");}
    toolsStep();
  },"primary"));
}
function toolsStep(){
  blank();out("⚕ Hermes Tool Configuration","cyan bold");
  out("  Enable or disable tools per platform.","dim");
  out("  Tools that need API keys will be configured when enabled.","dim");
  out("  Guide: https://hermes-agent.nousresearch.com/docs/user-guide/features/tools","blue");
  clearC();prompt("Toggle tools (Space) · "+TOOLSETS.filter(t=>t[2]).length+" pre-enabled · Continue when ready:");
  const w=document.createElement("div");w.className="list";
  TOOLSETS.forEach(([label,enables,on])=>{
    toolChecks[label]=on;
    const b=document.createElement("button");b.className="chk"+(on?" on":"");
    b.innerHTML=`<span class="box">${on?"[✓]":"[ ]"}</span>${label}  <span class="sub">${enables}</span>`;
    b.onclick=()=>{const v=b.classList.toggle("on");b.querySelector(".box").textContent=v?"[✓]":"[ ]";toolChecks[label]=v;};
    w.appendChild(b);
  });
  controls.appendChild(w);
  rowOf(btn("Continue →",()=>{
    enabledProviderTools=Object.keys(TOOL_PROVIDERS).filter(t=>toolChecks[t]);
    providerToolIdx=0;out("  Configuring "+enabledProviderTools.length+" tool(s) with provider choices…","dim");nextToolProvider();
  },"primary"));
}
function nextToolProvider(){
  if(providerToolIdx>=enabledProviderTools.length){return availability();}
  const tool=enabledProviderTools[providerToolIdx];
  const provs=TOOL_PROVIDERS[tool];
  blank();out("  --- "+tool+" - Choose a provider ---","cyan");
  clearC();prompt("Select provider for "+tool+":");
  const w=document.createElement("div");w.className="list";
  provs.forEach((p,i)=>w.appendChild(btn((i===0?"● ":"○ ")+p,()=>{out("✓   "+p.split(" [")[0].split(" —")[0]+" — configured","green");providerToolIdx++;nextToolProvider();},"opt")));
  controls.appendChild(w);
  rowOf(btn("Skip this tool",()=>{out("    Skipped "+tool,"dim");providerToolIdx++;nextToolProvider();}));
}
function availability(){
  header("Tool Availability Summary");
  const ok=SUMMARY_ROWS.filter(r=>r[0]==="✓").length;
  out("  "+ok+"/"+SUMMARY_ROWS.length+" tool categories available:","dim");blank();
  SUMMARY_ROWS.forEach(([m,name,miss])=>{
    if(m==="✓")out("   ✓ "+name,"green");
    else out("   ✗ "+name+" (missing "+miss+")","red");
  });
  blank();out("⚠ Some tools are disabled. Run 'hermes setup tools' to configure them,","yellow");
  out("⚠ or edit ~/.hermes/.env directly to add the missing API keys.","yellow");
  complete();
}
function complete(){
  blank();box(["✓ Setup Complete!"],"green");
  blank();out("📁 All your files are in ~/.hermes/:","cyan bold");blank();
  out("   Settings:  ~/.hermes/config.yaml","yellow");
  out("   API Keys:  ~/.hermes/.env","yellow");
  out("   Data:      ~/.hermes/cron/, sessions/, logs/","yellow");
  blank();out("────────────────────────────────────────────────────────────","dim");
  blank();out("📝 To edit your configuration:","cyan bold");blank();
  [["hermes setup","Re-run the full wizard"],["hermes setup model","Change model/provider"],["hermes setup terminal","Change terminal backend"],["hermes setup gateway","Configure messaging"],["hermes setup tools","Configure tool providers"],["",""],["hermes config","View current settings"],["hermes config edit","Open config in your editor"],["hermes config set <key> <value>","Set a specific value"]].forEach(([c,d])=>{
    if(!c){blank();return;}
    const pad=" ".repeat(Math.max(2,24-c.length));out("   "+c+pad+d, "green");
  });
  blank();out("────────────────────────────────────────────────────────────","dim");
  blank();out("🚀 Ready to go!","cyan bold");blank();
  out("   hermes              Start chatting","green");
  out("   hermes gateway      Start messaging gateway","green");
  out("   hermes doctor       Check for issues","green");
  clearC();rowOf(btn("↻ Run the wizard again",start,"primary"));
}
start();
</script>
</body>
</html>
