name: Windows native

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "install.ps1"
      - "run.ps1"
      - "Cargo.toml"
      - "src/**"
      - "vanta-ts/**"
      - ".github/workflows/windows-native.yml"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vanta-ts/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Build native kernel
        run: cargo build --bin vanta-kernel
      - name: Install agent dependencies
        working-directory: vanta-ts
        run: npm ci
      - name: Typecheck
        working-directory: vanta-ts
        run: npm run typecheck
      - name: Windows platform tests
        working-directory: vanta-ts
        run: npm test -- --run src/platform/shell.test.ts src/kernel/path.test.ts src/tools/shell-cmd.test.ts src/schedule/script-run.test.ts src/repl/goal-condition.test.ts src/setup/preflight.test.ts
      - name: Install through production PowerShell path
        shell: powershell
        run: .\install.ps1 -SkipPathUpdate -SkipSkillInstall
      - name: Launch through vanta.cmd
        shell: powershell
        run: '& "$HOME\.local\bin\vanta.cmd" --help'
      - name: Prove native kernel API
        shell: powershell
        run: |
          $kernel = Start-Process -FilePath ".\target\debug\vanta-kernel.exe" -ArgumentList "serve", "7788" -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($i = 0; $i -lt 20; $i++) {
              try {
                $status = Invoke-RestMethod "http://127.0.0.1:7788/api/status"
                if ($status.status -eq "ready") { $ready = $true; break }
              } catch { Start-Sleep -Milliseconds 250 }
            }
            if (-not $ready) { throw "native kernel did not become ready" }
            Write-Host "WINDOWS_KERNEL_OK"
          } finally {
            Stop-Process -Id $kernel.Id -Force -ErrorAction SilentlyContinue
          }
      - name: Prove gateway command path
        shell: powershell
        run: '& "$HOME\.local\bin\vanta.cmd" gateway verify-channels'
